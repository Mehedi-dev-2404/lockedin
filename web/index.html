<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Koda — the AI accountability agent for CS students grinding for internships. On Telegram. Always watching.">
  <title>LockedIn — Lock in. Land the offer.</title>
  <link rel="preload" as="image" href="/koda.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CUSTOM PROPERTIES
    ============================================================ */
    :root {
      --bg: hsl(218 64% 8%);
      --bg-deeper: hsl(218 64% 5%);
      --fg: #FAFAFA;
      --muted: #A1A1AA;
      --subtle: #71717A;
      --accent-cyan: #00C2FF;
      --accent-deep: #0044FF;
      --hairline: rgba(255, 255, 255, 0.08);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    button { font: inherit; cursor: pointer; border: none; background: none; }

    /* ============================================================
       BASE
    ============================================================ */
    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      animation: body-fade 1000ms ease-out forwards;
    }

    /* ============================================================
       KEYFRAMES
    ============================================================ */
    @keyframes body-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(var(--rise, 24px)); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes orb-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes glow-breathe {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @keyframes shimmer {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }

    @keyframes cta-pulse {
      0%, 100% { box-shadow: inset 0 0 24px rgba(0, 194, 255, 0.18), 0 0 0 0 rgba(0, 194, 255, 0); }
      50% { box-shadow: inset 0 0 24px rgba(0, 194, 255, 0.18), 0 0 40px rgba(0, 194, 255, 0.45); }
    }

    /* ============================================================
       Z-STACK — BACKGROUND LAYERS
    ============================================================ */

    /* Z-0: Orb container (positioned in HTML) */

    /* Z-1: Vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 75%);
      opacity: 0.85;
      pointer-events: none;
    }

    /* Z-2: Dot grid texture */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Z-3: SVG noise */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.04;
    }

    /* ============================================================
       ORB — Z-0
    ============================================================ */
    .orb-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* Glow halo — behind orb */
    .orb-glow {
      position: absolute;
      width: min(120vw, 1400px);
      height: min(120vw, 1400px);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        rgba(0, 194, 255, 0.35) 0%,
        rgba(0, 194, 255, 0.18) 20%,
        rgba(0, 68, 255, 0.08) 45%,
        transparent 70%);
      filter: blur(60px);
      mix-blend-mode: screen;
      opacity: 0;
      animation:
        fade-in 800ms var(--ease) 400ms forwards,
        glow-breathe 6s ease-in-out 2700ms infinite;
      will-change: transform, opacity;
    }

    /* Orb breathe wrapper */
    .orb-container {
      position: absolute;
      width: min(70vw, 900px);
      height: min(70vw, 900px);
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 120px 20px rgba(0, 194, 255, 0.25);
      opacity: 0;
      animation:
        fade-in 800ms var(--ease) 200ms forwards,
        orb-breathe 7s ease-in-out 2700ms infinite;
      will-change: transform, opacity;
      /* Safari iOS compositor fix — forces container onto its own GPU layer
         so border-radius clip is applied at the container level, not skipped
         when transformed children promote to their own layers */
      isolation: isolate;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    }

    /* Rotation wrapper inside breathe */
    .orb-spin {
      width: 100%;
      height: 100%;
      animation: orb-rotate 80s linear 2700ms infinite;
      will-change: transform;
      /* Mid-layer clip — rotating layer clips its own children */
      border-radius: 50%;
      overflow: hidden;
      isolation: isolate;
    }

    .orb-spin img {
      /* 110% + negative margin crops without transform, so no layer promotion
         that could escape the parent clip; equivalent crop to the old scale(1.08) */
      width: 110%;
      height: 110%;
      margin-left: -5%;
      margin-top: -5%;
      object-fit: cover;
      filter: brightness(1.05) saturate(1.1);
      /* Belt-and-braces: img pre-clipped to circle at paint time */
      border-radius: 50%;
      clip-path: circle(50% at 50% 50%);
      -webkit-clip-path: circle(50% at 50% 50%);
    }

    /* Shimmer overlay on orb */
    .orb-shimmer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      mix-blend-mode: overlay;
      background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.08) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: shimmer 12s linear 2700ms infinite;
      pointer-events: none;
    }

    /* ============================================================
       READABILITY MASK — Z-4
    ============================================================ */
    .headline-mask {
      position: absolute;
      z-index: 4;
      width: min(900px, 90vw);
      height: 500px;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center,
        rgba(10, 25, 41, 0.55) 0%,
        rgba(10, 25, 41, 0.3) 40%,
        transparent 75%);
      filter: blur(40px);
      pointer-events: none;
    }

    /* ============================================================
       TOP NAV — Z-10
    ============================================================ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px;
    }

    .nav-wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: var(--fg);
      letter-spacing: -0.01em;
    }

    .nav-login {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--muted);
      transition: color 200ms var(--ease);
    }
    .nav-login:hover { color: var(--fg); }

    /* ============================================================
       HERO CONTENT — Z-5
    ============================================================ */
    .hero {
      position: relative;
      z-index: 5;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100vh;
    }

    /* Section label */
    .section-divider {
      width: 1px;
      height: 24px;
      background: var(--hairline);
      margin-bottom: 16px;
      opacity: 0;
      animation: fade-in 800ms var(--ease) 600ms forwards;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 28px;
      opacity: 0;
      --rise: 16px;
      animation: fade-rise 800ms var(--ease) 600ms forwards;
    }

    /* Headline */
    .hero-headline {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 7.5rem);
      line-height: 0.98;
      letter-spacing: -0.025em;
      color: var(--fg);
      max-width: 14ch;
      text-shadow: 0 2px 60px rgba(0, 0, 0, 0.6);
      opacity: 0;
      --rise: 24px;
      animation: fade-rise 800ms var(--ease) 800ms forwards;
    }

    .hero-headline .italic-emphasis {
      font-style: italic;
    }

    /* Tagline */
    .hero-tagline {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      color: var(--muted);
      margin-top: 24px;
      letter-spacing: -0.01em;
      opacity: 0;
      --rise: 24px;
      animation: fade-rise 800ms var(--ease) 1100ms forwards;
    }

    /* Subhead */
    .hero-subhead {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 17px;
      color: var(--muted);
      max-width: 480px;
      margin-top: 36px;
      line-height: 1.55;
      opacity: 0;
      --rise: 24px;
      animation: fade-rise 800ms var(--ease) 1300ms forwards;
    }

    /* CTA */
    .cta {
      display: inline-block;
      margin-top: 44px;
      padding: 16px 36px;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 15px;
      color: var(--fg);
      opacity: 0;
      --rise: 24px;
      animation:
        fade-rise 800ms var(--ease) 1500ms forwards,
        cta-pulse 3.2s ease-in-out 2700ms infinite;
      transition: transform 280ms var(--ease);
    }
    .cta:hover {
      transform: scale(1.03);
    }
    .cta:focus-visible {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 4px;
    }

    /* Liquid glass */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.04);
      background-blend-mode: luminosity;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.18) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.18) 80%,
        rgba(255,255,255,0.55) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Mono trial text */
    .hero-trial {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 11px;
      color: var(--subtle);
      letter-spacing: 0.06em;
      margin-top: 20px;
      opacity: 0;
      --rise: 16px;
      animation: fade-rise 800ms var(--ease) 1700ms forwards;
    }

    /* ============================================================
       BOTTOM CAPTION — Z-10
    ============================================================ */
    .bottom-caption {
      position: fixed;
      bottom: 28px;
      left: 40px;
      right: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fade-in 800ms var(--ease) 1900ms forwards;
    }

    .bottom-caption span {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 11px;
      color: var(--subtle);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ============================================================
       RESPONSIVE — 768px
    ============================================================ */
    @media (max-width: 768px) {
      .nav { padding: 20px 24px; }

      /* Issue 6: pull content up — section label at ~25% from top, not 40% */
      .hero {
        padding: 25vh 20px 0;
        justify-content: flex-start;
      }

      /* Issue 7: section label legibility over orb's bright top edge */
      .section-label {
        margin-bottom: 16px; /* was 28px — tightens space before headline */
        text-shadow: 0 1px 20px rgba(10, 25, 41, 0.8);
      }

      /* Issue 6: tighten vertical spacing */
      .hero-headline {
        font-size: clamp(2.5rem, 11vw, 4rem);
        margin-top: 16px; /* was 0 — aligns with 24px→16px brief */
      }

      .hero-tagline { font-size: 1.1rem; }

      .hero-subhead {
        font-size: 15px;
        max-width: 100%;
        margin-top: 28px; /* was 36px */
      }

      /* Issue 4 + Issue 6: tighter CTA margin */
      .cta {
        font-size: 14px;
        margin-top: 36px; /* was 44px */
      }

      /* Issue 1: orb smaller on mobile — ambient, not foreground */
      .orb-container {
        width: min(70vw, 380px);
        height: min(70vw, 380px);
        aspect-ratio: 1 / 1;
        box-shadow: 0 0 60px 10px rgba(0, 194, 255, 0.25); /* was 120px 20px */
      }

      /* Issue 2: belt-and-braces circle fix for mobile browsers */
      .orb-spin img {
        border-radius: 50%;
      }

      /* Issue 3: stronger readability mask behind headline on mobile */
      .headline-mask {
        width: min(95vw, 500px);
        height: 600px;
        background: radial-gradient(ellipse at center,
          rgba(10, 25, 41, 0.75) 0%,
          rgba(10, 25, 41, 0.4) 40%,
          transparent 75%);
        filter: blur(60px);
      }

      /* Issue 5: bottom caption more readable on mobile */
      .bottom-caption {
        bottom: 20px;
        left: 24px;
        right: 24px;
        justify-content: center;
      }

      .bottom-caption span {
        font-size: 12px; /* was 11px */
        color: var(--muted); /* was var(--subtle) — #A1A1AA vs #71717A */
      }

      .bottom-caption .caption-right { display: none; }

      /* Issue 4: less aggressive glow pulse on small screens */
      @keyframes cta-pulse {
        0%, 100% { box-shadow: inset 0 0 24px rgba(0, 194, 255, 0.18), 0 0 0 0 rgba(0, 194, 255, 0); }
        50% { box-shadow: inset 0 0 24px rgba(0, 194, 255, 0.18), 0 0 20px rgba(0, 194, 255, 0.3); }
      }
    }

    /* ============================================================
       REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }

      body { opacity: 1; }

      .orb-glow,
      .orb-container,
      .section-divider,
      .section-label,
      .hero-headline,
      .hero-tagline,
      .hero-subhead,
      .cta,
      .hero-trial,
      .bottom-caption {
        opacity: 1;
        transform: none;
      }

      .cta:hover { transform: scale(1.03); }
    }
  </style>
</head>

<body>

  <!-- Z-0: ORB STAGE -->
  <div class="orb-stage" aria-hidden="true">
    <div class="orb-glow" id="orb-glow"></div>
    <div class="orb-container" id="orb-container">
      <div class="orb-spin">
        <img src="/koda.jpg" alt="Koda — your AI accountability agent" loading="eager" decoding="async" draggable="false">
      </div>
      <div class="orb-shimmer"></div>
    </div>
  </div>

  <!-- Z-1: Vignette -->
  <div class="vignette" aria-hidden="true"></div>

  <!-- Z-2: Dot grid -->
  <div class="dot-grid" aria-hidden="true"></div>

  <!-- Z-3: Noise -->
  <svg class="noise" aria-hidden="true" width="100%" height="100%">
    <filter id="noise-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise-filter)"/>
  </svg>

  <!-- Z-4: Readability mask -->
  <div class="headline-mask" aria-hidden="true"></div>

  <!-- Z-10: Top nav -->
  <nav class="nav">
    <a href="/" class="nav-wordmark">LockedIn</a>
    <a href="#" class="nav-login">Login</a>
  </nav>

  <!-- Z-5: Hero content -->
  <main class="hero">
    <div class="section-divider" aria-hidden="true"></div>
    <p class="section-label">Starting up. Locking in.</p>
    <h1 class="hero-headline">Built for the ones who <em class="italic-emphasis">don't sleep.</em></h1>
    <p class="hero-tagline">Lock in. Land the offer.</p>
    <p class="hero-subhead">The AI accountability agent for CS students grinding for internships. On Telegram. Always watching.</p>
    <!-- TELEGRAM_BOT_URL — replace href below before shipping -->
    <a href="https://t.me/lockedingrind_bot" class="cta liquid-glass" target="_blank" rel="noopener">Start grinding &#8594;</a>
    <p class="hero-trial">Free 7-day trial. Cancel anytime.</p>
  </main>

  <!-- Z-10: Bottom caption -->
  <div class="bottom-caption">
    <span class="caption-left">Koda / v1.0</span>
    <span class="caption-right">Accountability engine</span>
  </div>


  <script>
    /*
     * PLACEHOLDERS TO SWAP BEFORE SHIPPING:
     *
     *   1. TELEGRAM_BOT_URL: "https://t.me/lockedingrind_bot"
     *      Replace the href on the <a class="cta"> element above
     *      with your live Telegram bot deep link.
     */

    /* ============================================================
       MOUSE PARALLAX — orb shifts ±20px, glow shifts ±40px opposite
       Disabled on touch devices.
    ============================================================ */
    (function() {
      var isTouchDevice = window.matchMedia('(hover: none)').matches;
      if (isTouchDevice) return;

      var orbContainer = document.getElementById('orb-container');
      var orbGlow = document.getElementById('orb-glow');
      if (!orbContainer || !orbGlow) return;

      var currentX = 0, currentY = 0;
      var targetX = 0, targetY = 0;
      var lerp = 0.08;
      var running = false;

      document.addEventListener('mousemove', function(e) {
        var cx = window.innerWidth / 2;
        var cy = window.innerHeight / 2;
        targetX = (e.clientX - cx) / cx;
        targetY = (e.clientY - cy) / cy;
        if (!running) {
          running = true;
          requestAnimationFrame(tick);
        }
      });

      function tick() {
        currentX += (targetX - currentX) * lerp;
        currentY += (targetY - currentY) * lerp;

        var orbTx = currentX * 20;
        var orbTy = currentY * 20;
        var glowTx = currentX * -40;
        var glowTy = currentY * -40;

        orbContainer.style.transform = 'translate(' + orbTx + 'px, ' + orbTy + 'px)';
        orbGlow.style.transform = 'translate(' + glowTx + 'px, ' + glowTy + 'px)';

        if (Math.abs(targetX - currentX) > 0.001 || Math.abs(targetY - currentY) > 0.001) {
          requestAnimationFrame(tick);
        } else {
          running = false;
        }
      }
    })();
  </script>

</body>
</html>
