<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: hsl(218, 64%, 8%);
            --fg: #FAFAFA;
            --muted: #A1A1AA;
            --subtle: #71717A;
            --accent-cyan: #00C2FF;
            --accent-blue: #0044FF;
            --border: rgba(255, 255, 255, 0.08);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--fg);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .font-display {
            font-family: 'Instrument Serif', serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        #koda-orb {
            opacity: 0;
            transition: opacity 1.2s ease-out;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .scrim {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(10,25,41,0.25) 0%, rgba(10,25,41,0.72) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem 2.5rem;
            z-index: 20;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .wordmark {
            font-family: 'Instrument Serif', serif;
            font-size: 1.25rem;
            font-style: normal;
            color: var(--fg);
            letter-spacing: -0.01em;
            text-decoration: none;
        }

        .login-link {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color 0.2s ease;
        }

        .login-link:hover {
            color: var(--fg);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1rem;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3.5rem, 10vw, 9rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            line-height: 0.95;
            color: var(--fg);
            margin: 0;
            max-width: 14ch;
            opacity: 0;
        }

        h1 em {
            font-style: italic;
            color: var(--fg);
        }

        .sub-tagline {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 1.125rem;
            color: var(--muted);
            letter-spacing: -0.01em;
            margin: 0;
            opacity: 0;
        }

        .subhead {
            font-family: 'Inter', sans-serif;
            font-size: 1.0625rem;
            font-weight: 400;
            line-height: 1.7;
            color: var(--subtle);
            max-width: 48ch;
            margin: 0.25rem 0 0;
            opacity: 0;
        }

        .cta-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.875rem 2.25rem;
            border-radius: 9999px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--fg);
            text-decoration: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            opacity: 0;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            padding: 1.4px;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.45) 0%,
                rgba(255,255,255,0.15) 20%,
                rgba(255,255,255,0)    40%,
                rgba(255,255,255,0)    60%,
                rgba(255,255,255,0.15) 80%,
                rgba(255,255,255,0.45) 100%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .cta-btn:hover {
            transform: scale(1.03);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .trial-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--subtle);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 0;
            opacity: 0;
        }

        .bottom-row {
            display: flex;
            justify-content: center;
        }

        @keyframes fade-rise {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow-pulse {
            0%   { box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 0 30px rgba(0,194,255,0.3); }
            50%  { box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 0 60px rgba(0,194,255,0.6); }
            100% { box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 0 30px rgba(0,194,255,0.3); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: clamp(2.8rem, 8vw, 5rem);
                max-width: 100%;
            }
            .subhead {
                font-size: 0.9375rem;
                max-width: 100%;
            }
            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <video id="koda-orb" src="/koda.mp4" autoplay loop muted playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;"></video>

        <div class="scrim"></div>

        <div class="content">
            <nav>
                <a href="/" class="wordmark">LockedIn</a>
                <a href="#" class="login-link">Login</a>
            </nav>

            <div class="hero">
                <h1 id="headline">Built for the ones who <em>don't sleep.</em></h1>
                <p class="sub-tagline" id="sub-tagline">Lock in. Land the offer.</p>
                <p class="subhead" id="subhead">The AI accountability agent for CS students grinding for internships. On Telegram. Always watching.</p>
                <a href="https://t.me/LockedInKodaBot" class="cta-btn" id="cta" target="_blank" rel="noopener">Start grinding &#8594;</a>
            </div>

            <div class="bottom-row">
                <p class="trial-text" id="trial">Free 7-day trial. Cancel anytime.</p>
            </div>
        </div>
    </div>

    <script>
    /*
     * PLACEHOLDERS TO SWAP BEFORE SHIPPING:
     *
     *   1. CTA_URL: "https://t.me/LockedInKodaBot"
     *      → Replace with your live Telegram bot deep link
     *      → Located on the <a class="cta-btn"> href attribute
     */

    document.addEventListener('DOMContentLoaded', function() {
        var orb = document.getElementById('koda-orb');
        var headline = document.getElementById('headline');
        var subTagline = document.getElementById('sub-tagline');
        var subhead = document.getElementById('subhead');
        var cta = document.getElementById('cta');
        var trial = document.getElementById('trial');

        var easing = 'cubic-bezier(0.16, 1, 0.3, 1)';
        var duration = '800ms';

        // Fade in the orb video
        setTimeout(function() {
            orb.style.opacity = '1';
        }, 100);

        // Staggered fade-rise animations
        setTimeout(function() {
            headline.style.animation = 'fade-rise ' + duration + ' ' + easing + ' forwards';
        }, 0);

        setTimeout(function() {
            subTagline.style.animation = 'fade-rise ' + duration + ' ' + easing + ' forwards';
        }, 200);

        setTimeout(function() {
            subhead.style.animation = 'fade-rise ' + duration + ' ' + easing + ' forwards';
        }, 400);

        setTimeout(function() {
            cta.style.animation = 'fade-rise ' + duration + ' ' + easing + ' forwards';
            cta.addEventListener('animationend', function handler() {
                cta.removeEventListener('animationend', handler);
                cta.style.animation = 'glow-pulse 3s ease-in-out infinite';
                cta.style.opacity = '1';
                cta.style.transform = 'translateY(0)';
            });
        }, 600);

        setTimeout(function() {
            trial.style.animation = 'fade-rise ' + duration + ' ' + easing + ' forwards';
        }, 800);
    });
    </script>
</body>
</html>
